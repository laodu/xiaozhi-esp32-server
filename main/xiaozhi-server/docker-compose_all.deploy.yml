# 全量部署用（与 docker-compose_all.yml 区别：Python / 管理端均从本仓库源码构建，不拉上游预构建镜像）
# 使用方式：在 main/xiaozhi-server 目录下执行 docker compose -f docker-compose_all.deploy.yml up -d --build
# build.context 为仓库根目录（../..），需与 Dockerfile-server、Dockerfile-web 位置一致

services:
  xiaozhi-esp32-server:
    build:
      context: ../..
      dockerfile: Dockerfile-server
    container_name: xiaozhi-esp32-server
    depends_on:
      - xiaozhi-esp32-server-db
      - xiaozhi-esp32-server-redis
    restart: always
    networks:
      - default
    ports:
      - 8000:8000
      - 8003:8003
    security_opt:
      - seccomp:unconfined
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/opt/xiaozhi-esp32-server/data
      - ./models/SenseVoiceSmall/model.pt:/opt/xiaozhi-esp32-server/models/SenseVoiceSmall/model.pt

  # 管理端：Vue 构建 + Spring Boot JAR + Nginx（见仓库根目录 Dockerfile-web）
  xiaozhi-esp32-server-web:
    build:
      context: ../..
      dockerfile: Dockerfile-web
    image: xiaozhi-esp32-server-web:local
    container_name: xiaozhi-esp32-server-web
    restart: always
    networks:
      - default
    depends_on:
      xiaozhi-esp32-server-db:
        condition: service_healthy
      xiaozhi-esp32-server-redis:
        condition: service_healthy
    ports:
      - 8002:8002
    environment:
      - TZ=Asia/Shanghai
      - SPRING_DATASOURCE_DRUID_URL=jdbc:mysql://xiaozhi-esp32-server-db:3306/xiaozhi_esp32_server?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&connectTimeout=30000&socketTimeout=30000&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
      - SPRING_DATASOURCE_DRUID_USERNAME=root
      - SPRING_DATASOURCE_DRUID_PASSWORD=123456
      - SPRING_DATA_REDIS_HOST=xiaozhi-esp32-server-redis
      - SPRING_DATA_REDIS_PASSWORD=
      - SPRING_DATA_REDIS_PORT=6379
    volumes:
      - ./uploadfile:/uploadfile

  xiaozhi-esp32-server-db:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: xiaozhi-esp32-server-db
    healthcheck:
      test: [CMD, mysqladmin, ping, -h, localhost]
      timeout: 45s
      interval: 10s
      retries: 10
    restart: always
    networks:
      - default
    expose:
      - 3306
    volumes:
      - ./mysql/data:/var/lib/mysql
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=xiaozhi_esp32_server
      - MYSQL_INITDB_ARGS=--character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  xiaozhi-esp32-server-redis:
    image: docker.m.daocloud.io/library/redis:8.0
    expose:
      - 6379
    container_name: xiaozhi-esp32-server-redis
    restart: always
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default

networks:
  default:
